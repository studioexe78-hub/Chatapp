<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sphere Chat Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --sent-msg: #8b5cf6;
            --received-msg: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            height: 100vh; 
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* شاشة الدخول */
        #auth-screen {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .logo-icon { font-size: 60px; margin-bottom: 20px; color: var(--primary); }
        .auth-card { background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        input { 
            width: 100%; padding: 14px; margin: 10px 0; 
            background: #0f172a; border: 1px solid #334155; 
            border-radius: 12px; color: white; outline: none;
        }
        .btn-main { 
            width: 100%; padding: 14px; background: var(--primary); 
            color: white; border: none; border-radius: 12px; 
            font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px;
        }

        /* واجهة التطبيق الرئيسية */
        #app-screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        /* الرأس (Header) */
        .app-header {
            padding: 15px 20px;
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        /* القائمة الجانبية (الأصدقاء) على الموبايل */
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar {
            width: 100%;
            max-width: 320px;
            background: var(--bg-dark);
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* عند فتح المحادثة على الموبايل، نخفي السايدبار */
        @media (max-width: 768px) {
            .sidebar.hidden { display: none; }
            .chat-area { width: 100% !important; }
        }

        .section-title { padding: 15px 20px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .scroll-list { flex: 1; overflow-y: auto; }
        
        .user-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .user-item:hover { background: var(--card-bg); }
        .avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* منطقة المحادثة */
        .chat-area {
            flex: 1;
            display: none; /* مخفية حتى نختار شخص */
            flex-direction: column;
            background: #0f172a;
        }

        .chat-header { padding: 15px; background: var(--card-bg); display: flex; align-items: center; gap: 10px; }
        .back-btn { font-size: 20px; cursor: pointer; padding: 5px 10px; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--sent-msg); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--received-msg); color: white; border-bottom-left-radius: 4px; }

        .input-bar { padding: 15px; background: var(--card-bg); display: flex; gap: 10px; align-items: center; }
        .input-bar input { margin: 0; background: #0f172a; border: none; }
        .send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; }

        /* حالة الفارغ */
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="logo-icon">💠</div>
    <div class="auth-card">
        <h2>Sphere Chat</h2>
        <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 10px;">سجل دخولك للمتابعة</p>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn-main" onclick="handleAuth()">دخول / إنشاء حساب</button>
    </div>
</div>

<div id="app-screen">
    <div class="app-header">
        <span style="font-weight: bold; font-size: 18px;">Sphere Chat</span>
        <button onclick="auth.signOut()" style="background:none; border:none; color:var(--primary); cursor:pointer;">تسجيل الخروج</button>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="section-title">طلبات الصداقة</div>
            <div id="requests-list" class="scroll-list" style="max-height: 120px;"></div>
            
            <div class="section-title">الأصدقاء</div>
            <div id="friends-list" class="scroll-list"></div>
            
            <div class="section-title">اكتشاف أشخاص</div>
            <div id="users-list" class="scroll-list"></div>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="chat-header">
                <span class="back-btn" onclick="closeChat()">❮</span>
                <div class="avatar" id="chat-avatar" style="width:35px; height:35px; font-size:14px;"></div>
                <span id="chat-with-name"></span>
            </div>
            <div class="messages-container" id="msg-window"></div>
            <div class="input-bar">
                <input type="text" id="msg-input" placeholder="اكتب رسالتك...">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>

        <div class="empty-state" id="empty-view">
            <div style="font-size: 50px;">💬</div>
            <p>اختر صديقاً لبدء الدردشة</p>
        </div>
    </div>
</div>

<script>
    // الإعدادات الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyD3FaymMJnHUQi4Op0z7ngEY1n4OFCh3ww",
        authDomain: "chatapp-61941.firebaseapp.com",
        projectId: "chatapp-61941",
        storageBucket: "chatapp-61941.firebasestorage.app",
        messagingSenderId: "975931996351",
        appId: "1:975931996351:web:21edbea89da6bda734ae0a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentChatId = null;

    // طلب إذن الإشعارات عند التحميل
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection("users").doc(email).set({ email: email });
        } catch (e) {
            if (e.code === 'auth/email-already-in-use') await auth.signInWithEmailAndPassword(email, pass);
            else alert(e.message);
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            initApp();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
        }
    });

    function initApp() {
        const me = auth.currentUser.email;

        // اكتشاف أشخاص
        db.collection("users").onSnapshot(snap => {
            const list = document.getElementById('users-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                if (doc.id !== me) {
                    list.innerHTML += `<div class="user-item" onclick="sendFriendRequest('${doc.id}')">
                        <div class="avatar">${doc.id[0].toUpperCase()}</div>
                        <div style="flex:1"><b>${doc.id.split('@')[0]}</b><br><small style="color:var(--text-dim)">اضغط للإضافة</small></div>
                    </div>`;
                }
            });
        });

        // طلبات الصداقة
        db.collection("friend_requests").where("to", "==", me).where("status", "==", "pending").onSnapshot(snap => {
            const list = document.getElementById('requests-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                list.innerHTML += `<div class="user-item">
                    <div style="flex:1"><b>${doc.data().from.split('@')[0]}</b></div>
                    <button class="btn-main" style="width:auto; padding:5px 10px; font-size:12px;" onclick="acceptRequest('${doc.id}', '${doc.data().from}')">قبول</button>
                </div>`;
            });
        });

        // الأصدقاء والدردشة
        db.collection("friendships").where("users", "array-contains", me).onSnapshot(snap => {
            const list = document.getElementById('friends-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const friend = doc.data().users.find(u => u !== me);
                list.innerHTML += `<div class="user-item" onclick="openChat('${friend}')">
                    <div class="avatar" style="background:#4ade80">${friend[0].toUpperCase()}</div>
                    <div><b>${friend.split('@')[0]}</b><br><small style="color:#4ade80">صديق</small></div>
                </div>`;
            });
        });
    }

    async function sendFriendRequest(target) {
        await db.collection("friend_requests").add({ from: auth.currentUser.email, to: target, status: "pending" });
        alert("تم إرسال الطلب!");
    }

    async function acceptRequest(id, from) {
        await db.collection("friend_requests").doc(id).delete();
        await db.collection("friendships").add({ users: [auth.currentUser.email, from] });
    }

    function openChat(friend) {
        currentChatId = [auth.currentUser.email, friend].sort().join("_");
        document.getElementById('empty-view').style.display = 'none';
        document.getElementById('chat-area').style.display = 'flex';
        document.getElementById('sidebar').classList.add('hidden');
        document.getElementById('chat-with-name').innerText = friend.split('@')[0];
        document.getElementById('chat-avatar').innerText = friend[0].toUpperCase();
        loadMessages();
    }

    function closeChat() {
        document.getElementById('chat-area').style.display = 'none';
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('empty-view').style.display = 'flex';
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        await db.collection("chats").doc(currentChatId).collection("messages").add({
            text: input.value,
            sender: auth.currentUser.email,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    function loadMessages() {
        db.collection("chats").doc(currentChatId).collection("messages").orderBy("time").onSnapshot(snap => {
            const win = document.getElementById('msg-window');
            win.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.sender === auth.currentUser.email;
                win.innerHTML += `<div class="msg ${isMe ? 'sent' : 'received'}">${d.text}</div>`;
                
                // الإشعارات إذا كانت الرسالة من الطرف الآخر والتطبيق في الخلفية
                if (!isMe && document.hidden) {
                    new Notification("رسالة جديدة", { body: d.text });
                }
            });
            win.scrollTop = win.scrollHeight;
        });
    }
</script>
</body>
</html>
