<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ultra-Sharpen Upscaler | مُحسن الصور الخارق</title>
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0a0c10;
            --card: #14171f;
            --text: #c9d1d9;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 25px; }

        .upload-zone {
            padding: 50px 20px;
            border: 2px dashed var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.03);
        }

        .upload-icon { font-size: 40px; color: var(--border); }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 16px 30px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn:active { transform: scale(0.98); }

        #loader {
            display: none;
            margin: 30px 0;
            color: var(--primary);
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .preview-area {
            margin-top: 30px;
            display: none;
        }

        .result-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .result-container span {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,242,254,0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid var(--primary);
        }

        canvas {
            width: 100%;
            max-height: 500px;
            border-radius: 16px;
            border: 1px solid var(--border);
            object-fit: contain;
        }

        .download-btn {
            background: #238636;
            color: white;
            text-decoration: none;
            display: block;
            padding: 15px;
            border-radius: 14px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>AI Ultra-Sharpen Upscaler 🚀</h1>
    <div class="subtitle">تحسين احترافي للدقة والحدة بواسطة Cloudinary + HTML5 Canvas</div>

    <div class="upload-zone" id="uploadBtn">
        <div class="upload-icon">📸</div>
        <p id="statusText">اضغط لرفع الصورة من جهازك</p>
    </div>

    <div id="loader">⏳ جاري تكبير الصورة وتحسين الحدة... يرجى الانتظار ثواني</div>

    <div class="preview-area" id="previewArea">
        <div class="result-container">
            <span>النتيجة الخارقة (HD + Sharp)</span>
            <canvas id="resultCanvas"></canvas>
        </div>
        <a id="downloadLink" href="#" target="_blank" class="download-btn">حفظ الصورة بجودة احترافية</a>
    </div>
</div>

<script>
    // --- إعدادات Cloudinary الخاصة بك ---
    const cloudName = "dg75swlx9"; 
    const apiKey = "785218438847777";
    const uploadPreset = "unsigned_preset"; // تأكد أنه Unsigned في إعداداتك

    const uploadBtn = document.getElementById('uploadBtn');
    const previewArea = document.getElementById('previewArea');
    const resultCanvas = document.getElementById('resultCanvas');
    const loader = document.getElementById('loader');
    const downloadLink = document.getElementById('downloadLink');

    // 1. إعداد الـ Upload Widget
    const myWidget = cloudinary.createUploadWidget({
        cloudName: cloudName,
        uploadPreset: uploadPreset,
        apiKey: apiKey,
        multiple: false,
        sources: ["local", "url", "camera"],
        theme: "minimal",
        clientAllowedFormats: ["png","jpg","jpeg"]
    }, (error, result) => {
        if (!error && result && result.event === "success") {
            processImageWithCloudinaryAI(result.info.public_id, result.info.format);
        }
    });

    uploadBtn.onclick = () => myWidget.open();

    // 2. تحسين الصورة بواسطة Cloudinary AI
    function processImageWithCloudinaryAI(publicId, format) {
        loader.style.display = "block";
        uploadBtn.style.display = "none";

        // نستخدم روابط التحويل الذكي للتكبير
        const enhancedUrl = `https://res.cloudinary.com/${cloudName}/image/upload/e_upscale,w_2000,c_limit,q_auto:best/${publicId}.${format}`;
        
        // تحميل الصورة المحسنة في الخلفية
        const img = new Image();
        img.crossOrigin = "anonymous"; // ضروري للسماح للـ Canvas بالتعامل مع الصورة
        img.src = enhancedUrl;

        img.onload = () => {
            // 3. تطبيق فلتر الحدة اليدوي بواسطة HTML5 Canvas
            applyUltraSharpenFilter(img);
        };
    }

    // 4. دالة فلتر الحدة اليدوي (The Secret Sauce)
    function applyUltraSharpenFilter(sourceImg) {
        const ctx = resultCanvas.getContext('2d');
        
        // ضبط أبعاد الـ Canvas لتطابق الصورة
        resultCanvas.width = sourceImg.width;
        resultCanvas.height = sourceImg.height;
        
        // رسم الصورة الأصلية
        ctx.drawImage(sourceImg, 0, 0);

        // جلب بكسلات الصورة
        const imageData = ctx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
        const pixels = imageData.data;

        // مصفوفة "الالتفاف" لفلتر الحدة (Unsharp Masking - High Pass)
        // [ 0, -1, 0 ]
        // [ -1, 5, -1 ]
        // [ 0, -1, 0 ]
        const matrix = [ 0, -1, 0, -1, 5, -1, 0, -1, 0 ];
        const weight = 1; // وزن الفلتر

        // تطبيق الفلتر على البكسلات (خوارزمية Convolution)
        const side = Math.round(Math.sqrt(matrix.length));
        const halfSide = Math.floor(side/2);
        const w = imageData.width;
        const h = imageData.height;

        const src = new Uint32Array(pixels.buffer); // مصفوفة سريعة للنسخ
        for (let y=0; y<h; y++) {
            for (let x=0; x<w; x++) {
                let r=0, g=0, b=0;
                for (let cy=0; cy<side; cy++) {
                    for (let cx=0; cx<side; cx++) {
                        const scy = y + cy - halfSide;
                        const scx = x + cx - halfSide;
                        if (scy >= 0 && scy < h && scx >= 0 && scx < w) {
                            const srcPos = (scy * w + scx) * 4;
                            const wt = matrix[cy * side + cx];
                            r += pixels[srcPos] * wt;
                            g += pixels[srcPos+1] * wt;
                            b += pixels[srcPos+2] * wt;
                        }
                    }
                }
                const dstPos = (y * w + x) * 4;
                pixels[dstPos] = r;
                pixels[dstPos+1] = g;
                pixels[dstPos+2] = b;
            }
        }

        // تحديث بكسلات الـ Canvas بالنتيجة الحادة
        ctx.putImageData(imageData, 0, 0);

        // عرض النتيجة وتجهيز رابط التحميل
        setTimeout(() => {
            loader.style.display = "none";
            previewArea.style.display = "block";
            downloadLink.href = resultCanvas.toDataURL("image/png", 1.0); // تصدير بجودة 100%
            downloadLink.download = "Ultra_Sharp_Image.png";
        }, 1000);
    }
</script>

</body>
</html>
