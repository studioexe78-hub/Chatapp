<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Upscaler - Final Fix</title>
    
    <script src="https://unpkg.com/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://unpkg.com/upscaler@0.14.1/dist/browser/umd/upscaler.min.js"></script>

    <style>
        body { background: #0f0f10; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e1e20; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #333; }
        .btn { background: #00d2ff; color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn:disabled { background: #444; color: #888; }
        #status { margin: 15px 0; color: #ffeb3b; font-size: 14px; }
        img { max-width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        .preview { border: 1px dashed #444; padding: 10px; margin-top: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>محسن الصور الذكي 🚀</h2>
    <div id="status">جاري تحميل محرك الذكاء الاصطناعي...</div>
    
    <input type="file" id="imgInput" accept="image/*" style="display:none">
    <button class="btn" onclick="document.getElementById('imgInput').click()">اختر صورة</button>

    <div class="preview">
        <p style="font-size: 12px; color: #888;">المعاينة</p>
        <img id="before">
        <img id="after" style="border: 2px solid #00d2ff;">
    </div>

    <button id="runBtn" class="btn" disabled>ابدأ المعالجة</button>
    <a id="save" style="display:none"><button class="btn" style="background:#28a745">حفظ الصورة</button></a>
</div>

<script>
    const status = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');
    const before = document.getElementById('before');
    const after = document.getElementById('after');
    let upscaler;

    // محاولة تحميل المكتبة فور تشغيل الصفحة
    async function init() {
        try {
            status.innerText = "جاري تهيئة المحرك... يرجى الانتظار";
            upscaler = new Upscaler();
            // اختبار المحرك بصورة وهمية لضمان تحميل الموديل
            status.innerText = "جاهز للعمل ✅";
        } catch (e) {
            status.innerText = "❌ فشل التحميل! تأكد من اتصالك بالإنترنت أو أوقف الـ VPN";
            console.error(e);
        }
    }

    document.getElementById('imgInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                before.src = ev.target.result;
                before.style.display = "block";
                after.style.display = "none";
                runBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }
    };

    runBtn.onclick = async () => {
        if (!upscaler) return alert("المحرك غير جاهز");
        
        runBtn.disabled = true;
        status.innerText = "⏳ جاري المعالجة... (قد يستغرق 30 ثانية)";
        
        try {
            const result = await upscaler.upscale(before);
            after.src = result;
            after.style.display = "block";
            document.getElementById('save').href = result;
            document.getElementById('save').download = "high_res.png";
            document.getElementById('save').style.display = "block";
            status.innerText = "تم التحسين بنجاح! 🎉";
        } catch (err) {
            status.innerText = "❌ حدث خطأ أثناء المعالجة";
            console.error(err);
        } finally {
            runBtn.disabled = false;
        }
    };

    init();
</script>

</body>
</html>
