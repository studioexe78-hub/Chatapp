<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Sphere Pro - Friends System</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.95); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* الشاشات */
        #auth-screen, #app-screen { background: var(--glass); border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); overflow: hidden; display: none; }
        #auth-screen { width: 380px; padding: 40px; text-align: center; display: block; }

        /* تطبيق الدردشة */
        #app-screen { width: 95%; max-width: 1100px; height: 85vh; display: none; flex-direction: row; }
        
        /* القائمة الجانبية */
        .sidebar { width: 320px; background: #fff; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        .section-title { padding: 10px 20px; font-size: 12px; font-weight: bold; color: #64748b; background: #f1f5f9; text-transform: uppercase; }
        
        .list-container { flex: 1; overflow-y: auto; }
        .user-card { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .user-card:hover { background: #f8fafc; }
        
        /* الأزرار */
        .btn { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #dcfce7; color: #166534; }
        .btn-accept { background: var(--primary); color: white; }
        .btn-chat { background: #f1f5f9; color: #1e293b; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; margin-top: 20px; font-size: 16px; }

        /* منطقة الدردشة */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .chat-placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; background: #f8fafc; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 16px; border-radius: 15px; max-width: 70%; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; color: #1e293b; border-bottom-left-radius: 2px; }

        .input-bar { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        input[type="text"], input[type="email"], input[type="password"] { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2 style="margin-bottom: 10px; color: var(--primary);">Chat Sphere Pro</h2>
    <p style="color: #64748b; margin-bottom: 20px;">سجل دخولك لبدء تكوين الصداقات</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور (6 خانات)">
    <button class="btn btn-main" onclick="handleAuth()">دخول / إنشاء حساب</button>
</div>

<div id="app-screen">
    <div class="sidebar">
        <div class="sidebar-header">
            <span id="my-name">المستخدم</span>
            <button onclick="auth.signOut()" style="background:none; border:none; color:white; cursor:pointer; font-size:12px;">خروج</button>
        </div>
        
        <div class="section-title">طلبات الصداقة الواردة</div>
        <div id="requests-list" class="list-container" style="max-height: 150px;"></div>

        <div class="section-title">أصدقائي</div>
        <div id="friends-list" class="list-container"></div>

        <div class="section-title">اكتشف أشخاصاً جدد</div>
        <div id="users-list" class="list-container"></div>
    </div>

    <div class="main-content" id="chat-panel">
        <div class="chat-placeholder" id="placeholder">
            <div style="font-size: 50px;">👋</div>
            <p>اختر صديقاً لبدء الدردشة</p>
        </div>
        
        <div id="chat-active" style="display:none; flex: 1; flex-direction: column;">
            <div style="padding: 15px 20px; border-bottom: 1px solid #e2e8f0; font-weight: bold;" id="active-user-name"></div>
            <div class="messages" id="msg-window"></div>
            <div class="input-bar">
                <input type="text" id="msg-input" placeholder="اكتب رسالة...">
                <button class="btn btn-accept" onclick="sendMessage()">إرسال</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD3FaymMJnHUQi4Op0z7ngEY1n4OFCh3ww",
        authDomain: "chatapp-61941.firebaseapp.com",
        projectId: "chatapp-61941",
        storageBucket: "chatapp-61941.firebasestorage.app",
        messagingSenderId: "975931996351",
        appId: "1:975931996351:web:21edbea89da6bda734ae0a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentChatId = null;

    // 1. تسجيل الدخول والإنشاء
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if (pass.length < 6) return alert("الكلمة قصيرة جداً");
        try {
            await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection("users").doc(email).set({ email: email, friends: [] });
        } catch (e) {
            if (e.code === 'auth/email-already-in-use') await auth.signInWithEmailAndPassword(email, pass);
            else alert(e.message);
        }
    }

    // 2. مراقبة حالة المستخدم وتحميل البيانات
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            document.getElementById('my-name').innerText = user.email.split('@')[0];
            initListeners();
        } else {
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('app-screen').style.display = 'none';
        }
    });

    function initListeners() {
        const me = auth.currentUser.email;

        // اكتشاف أشخاص جدد (ليسوا أصدقائي ولم أرسل لهم طلباً)
        db.collection("users").onSnapshot(snap => {
            const list = document.getElementById('users-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                if (doc.id !== me) {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.innerHTML = `<span>${doc.id.split('@')[0]}</span> 
                                     <button class="btn btn-add" onclick="sendFriendRequest('${doc.id}')">إضافة</button>`;
                    list.appendChild(div);
                }
            });
        });

        // طلبات الصداقة الواردة
        db.collection("friend_requests").where("to", "==", me).where("status", "==", "pending")
        .onSnapshot(snap => {
            const list = document.getElementById('requests-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const div = document.createElement('div');
                div.className = 'user-card';
                div.innerHTML = `<span>${doc.data().from.split('@')[0]}</span> 
                                 <button class="btn btn-accept" onclick="acceptRequest('${doc.id}', '${doc.data().from}')">قبول</button>`;
                list.appendChild(div);
            });
        });

        // قائمة الأصدقاء (العلاقات المقبولة)
        db.collection("friendships").where("users", "array-contains", me)
        .onSnapshot(snap => {
            const list = document.getElementById('friends-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const friend = doc.data().users.find(u => u !== me);
                const div = document.createElement('div');
                div.className = 'user-card';
                div.innerHTML = `<span>${friend.split('@')[0]}</span> 
                                 <button class="btn btn-chat" onclick="openChat('${friend}')">دردشة</button>`;
                list.appendChild(div);
            });
        });
    }

    // 3. منطق طلبات الصداقة
    async function sendFriendRequest(target) {
        const me = auth.currentUser.email;
        await db.collection("friend_requests").add({
            from: me,
            to: target,
            status: "pending"
        });
        alert("تم إرسال الطلب!");
    }

    async function acceptRequest(reqId, fromUser) {
        const me = auth.currentUser.email;
        // تحديث الطلب ليصبح مقبولاً
        await db.collection("friend_requests").doc(reqId).delete();
        // إنشاء علاقة صداقة رسمية
        await db.collection("friendships").add({
            users: [me, fromUser],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // 4. منطق الدردشة الخاصة
    function openChat(friendEmail) {
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('chat-active').style.display = 'flex';
        document.getElementById('active-user-name').innerText = "دردشة مع " + friendEmail.split('@')[0];
        
        currentChatId = [auth.currentUser.email, friendEmail].sort().join("_");
        loadMessages();
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !currentChatId) return;

        await db.collection("chats").doc(currentChatId).collection("messages").add({
            text: input.value,
            sender: auth.currentUser.email,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    function loadMessages() {
        db.collection("chats").doc(currentChatId).collection("messages").orderBy("time")
        .onSnapshot(snap => {
            const win = document.getElementById('msg-window');
            win.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = `msg ${d.sender === auth.currentUser.email ? 'sent' : 'received'}`;
                div.innerText = d.text;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        });
    }
</script>
</body>
</html>
