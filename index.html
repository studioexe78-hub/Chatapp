<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محسن الصور الخارق - AI Upscaler</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0f0f10;
            --card: #1e1e20;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 25px; }

        .upload-box {
            border: 2px dashed var(--primary);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-box:hover { background: rgba(0, 210, 255, 0.1); }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .img-card {
            background: #2a2a2d;
            padding: 10px;
            border-radius: 10px;
        }

        img {
            max-width: 100%;
            border-radius: 8px;
            display: block;
            margin: 10px auto;
        }

        .btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        #loading {
            display: none;
            margin-top: 15px;
            color: var(--primary);
        }

        .badge {
            background: #444;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Image Upscaler 🚀</h1>
    <p>ارفع صورتك واترك الذكاء الاصطناعي يضاعف دقتها</p>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <span>اضغط هنا لاختيار صورة</span>
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <div class="preview-grid">
        <div class="img-card">
            <span class="badge">قبل</span>
            <img id="beforeImg" src="" style="display:none;">
        </div>
        <div class="img-card">
            <span class="badge">بعد (AI)</span>
            <img id="afterImg" src="" style="display:none;">
        </div>
    </div>

    <div id="loading">جاري معالجة الصورة... قد يستغرق الأمر ثواني</div>
    
    <button id="processBtn" class="btn" disabled>تحسين الجودة</button>
    <a id="downloadLink" style="display:none;"><button class="btn" style="background:#28a745">حفظ الصورة</button></a>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const beforeImg = document.getElementById('beforeImg');
    const afterImg = document.getElementById('afterImg');
    const processBtn = document.getElementById('processBtn');
    const loading = document.getElementById('loading');
    const downloadLink = document.getElementById('downloadLink');

    // تعريف المحسن (Upscaler)
    const upscaler = new Upscaler();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                beforeImg.src = event.target.result;
                beforeImg.style.display = 'block';
                processBtn.disabled = false;
                afterImg.style.display = 'none';
                downloadLink.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    };

    processBtn.onclick = async () => {
        processBtn.disabled = true;
        loading.style.display = 'block';
        
        try {
            // المعالجة باستخدام الذكاء الاصطناعي
            const upscaledImage = await upscaler.upscale(beforeImg.src);
            
            // عرض النتيجة
            afterImg.src = upscaledImage;
            afterImg.style.display = 'block';
            
            // تجهيز رابط التحميل
            downloadLink.href = upscaledImage;
            downloadLink.download = "upscaled_image.png";
            downloadLink.style.display = 'inline-block';
            
        } catch (error) {
            alert("حدث خطأ أثناء المعالجة: " + error);
        } finally {
            loading.style.display = 'none';
            processBtn.disabled = false;
        }
    };
</script>

</body>
</html>
