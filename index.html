<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Upscaler Pro 🚀</title>
    <style>
        :root {
            --primary: #00f2fe;
            --bg: #0d1117;
            --card: #161b22;
            --text: #e6edf3;
            --accent: #238636;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 10px; font-size: 24px; }
        .status-msg { font-size: 14px; color: #8b949e; margin-bottom: 20px; }

        .drop-zone {
            border: 2px dashed #30363d;
            padding: 40px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .drop-zone:hover { border-color: var(--primary); background: rgba(0, 242, 254, 0.05); }

        .btn {
            background: var(--primary);
            color: #0d1117;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.2s;
        }

        .btn:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }

        #loader { display: none; margin: 20px 0; color: var(--primary); font-weight: bold; }

        .result-area { display: none; margin-top: 25px; }

        canvas {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #30363d;
            margin-bottom: 15px;
        }

        .download-link {
            background: var(--accent);
            color: white;
            text-decoration: none;
            display: block;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Image Upscaler 🚀</h1>
    <p class="status-msg">تحسين الدقة والوضوح بتقنية Cloudinary AI</p>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <p id="fileNameDisplay">اضغط هنا لاختيار صورة</p>
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <div id="loader">⏳ جاري المعالجة الذكية... قد يستغرق الأمر ثواني</div>

    <div class="result-area" id="resultArea">
        <canvas id="outputCanvas"></canvas>
        <a id="downloadBtn" href="#" class="download-link">تحميل الصورة بجودة HD</a>
    </div>
</div>

<script>
    // --- إعداداتك الخاصة ---
    const cloudName = "dg75swlx9";
    const uploadPreset = "ml_default"; // الاسم اللي أكدت عليه

    const fileInput = document.getElementById('fileInput');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('resultArea');
    const outputCanvas = document.getElementById('outputCanvas');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileNameDisplay = document.getElementById('fileNameDisplay');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        fileNameDisplay.innerText = "تم اختيار: " + file.name;
        loader.style.display = "block";
        resultArea.style.display = "none";

        // 1. إعداد الرفع
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', uploadPreset);

        try {
            // 2. الرفع المباشر لـ Cloudinary
            const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.public_id) {
                // 3. تطبيق فلاتر AI قوية جداً:
                // e_upscale: تكبير ذكي
                // e_unsharp_mask:90: زيادة حدة التفاصيل
                // q_auto:best: جودة قصوى
                const finalUrl = `https://res.cloudinary.com/${cloudName}/image/upload/e_upscale,w_1800,c_limit,e_unsharp_mask:100,q_auto:best/${data.public_id}.${data.format}`;
                
                renderResult(finalUrl);
            } else {
                alert("خطأ: تأكد أن إعداد ml_default هو Unsigned في حسابك.");
                loader.style.display = "none";
            }
        } catch (err) {
            console.error(err);
            alert("حدث خطأ في الاتصال بالسيرفر.");
            loader.style.display = "none";
        }
    };

    function renderResult(url) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;
        
        img.onload = () => {
            const ctx = outputCanvas.getContext('2d');
            outputCanvas.width = img.width;
            outputCanvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            loader.style.display = "none";
            resultArea.style.display = "block";
            
            // تحويل الـ Canvas لرابط تحميل
            downloadBtn.href = outputCanvas.toDataURL("image/png");
            downloadBtn.download = "Enhanced_Photo_HD.png";
        };
    }
</script>

</body>
</html>
