<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudinary AI Upscaler | مُحسن الصور الاحترافي</title>
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 90%;
            max-width: 500px;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid #30363d;
            text-align: center;
        }

        h1 {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .upload-zone {
            margin: 25px 0;
            padding: 40px;
            border: 2px dashed #30363d;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.05);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.98); }

        .preview-area {
            margin-top: 25px;
            display: none;
        }

        .img-box {
            position: relative;
            margin-bottom: 20px;
        }

        .img-box span {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--primary);
        }

        img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #30363d;
        }

        #loader {
            display: none;
            margin: 20px 0;
            color: var(--primary);
            font-style: italic;
        }

        .download-btn {
            background: #238636;
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>AI Photo Enhancer ⚡</h1>
    <p>تحسين الجودة تلقائياً باستخدام Cloudinary AI</p>

    <div class="upload-zone" id="uploadBtn">
        <p id="statusText">اضغط لرفع الصورة وبدء التحسين</p>
    </div>

    <div id="loader">جاري المعالجة بواسطة الذكاء الاصطناعي...</div>

    <div class="preview-area" id="previewArea">
        <div class="img-box">
            <span>النتيجة المحسنة (HD)</span>
            <img id="resultImg" src="">
        </div>
        <a id="downloadLink" href="#" target="_blank" class="download-btn">تحميل الصورة بجودة عالية</a>
    </div>
</div>

<script>
    const cloudName = "dg75swlx9"; // من الـ URL الخاص بك
    const apiKey = "785218438847777";
    const uploadBtn = document.getElementById('uploadBtn');
    const previewArea = document.getElementById('previewArea');
    const resultImg = document.getElementById('resultImg');
    const loader = document.getElementById('loader');
    const downloadLink = document.getElementById('downloadLink');

    // إعداد الـ Cloudinary Upload Widget
    const myWidget = cloudinary.createUploadWidget({
        cloudName: cloudName,
        uploadPreset: 'unsigned_preset', // تأكد من إنشاء 'Unsigned Preset' في إعدادات Cloudinary
        apiKey: apiKey,
        multiple: false,
        sources: ["local", "url", "camera"],
        theme: "minimal"
    }, (error, result) => {
        if (!error && result && result.event === "success") {
            console.log('تم الرفع بنجاح:', result.info);
            processImage(result.info.public_id, result.info.format);
        }
    });

    uploadBtn.onclick = () => myWidget.open();

    function processImage(publicId, format) {
        loader.style.display = "block";
        uploadBtn.style.display = "none";

        // هنا السحر: نستخدم روابط التحويل الخاصة بـ Cloudinary
        // e_improve: تحسين الألوان والتباين
        // w_1000,c_scale: تكبير الصورة لعرض 1000 بكسل
        // q_auto: اختيار أفضل جودة ممكنة
        const enhancedUrl = `https://res.cloudinary.com/${cloudName}/image/upload/e_improve,w_1200,c_scale,q_auto/${publicId}.${format}`;

        // عرض النتيجة
        setTimeout(() => {
            resultImg.src = enhancedUrl;
            resultImg.onload = () => {
                loader.style.display = "none";
                previewArea.style.display = "block";
                downloadLink.href = enhancedUrl;
            };
        }, 1000);
    }
</script>

</body>
</html>
